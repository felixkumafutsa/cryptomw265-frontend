<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoSpreadX - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .sidebar { background-color: #1e293b; }
        .card { background-color: #1e293b; }
        .table-row:hover { background-color: #334155; }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 sidebar flex-col h-full transition-all duration-300 fixed lg:static z-50 transform -translate-x-full lg:translate-x-0">
        <!-- Sidebar content will be dynamically generated -->
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <!-- Header content will be dynamically generated -->
        </header>

        <div id="page-users" class="page-content">
            <div class="card rounded-2xl overflow-x-auto shadow-lg">
                <table class="w-full text-left min-w-[600px]">
                    <thead class="bg-slate-800/50 text-slate-400 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4 font-medium">User</th>
                            <th class="px-6 py-4 font-medium">Tier</th>
                            <th class="px-6 py-4 font-medium">Joined</th>
                            <th class="px-6 py-4 font-medium">Sub Expires</th>
                            <th class="px-6 py-4 font-medium text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body" class="divide-y divide-slate-800">
                        <!-- User data will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- User Edit Modal -->
    <div id="user-modal" class="modal">
        <div class="bg-slate-800 rounded-2xl p-6 w-full max-w-md shadow-2xl scale-95 transition-transform duration-200" id="user-modal-content">
            <h3 class="text-xl font-bold mb-4">Edit User</h3>
            <div class="space-y-4">
                <input type="hidden" id="edit-user-id">
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Tier</label>
                    <select id="edit-user-tier" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="free">Free</option>
                        <option value="pro">Pro</option>
                        <option value="vip">VIP</option>
                        <option value="banned">Banned</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Subscribed Until</label>
                    <input type="date" id="edit-user-expiry" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div class="mt-6 flex gap-3 justify-end">
                <button onclick="closeUserModal()" class="px-4 py-2 hover:bg-slate-700 rounded-xl">Cancel</button>
                <button onclick="saveUserEdit()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold">Save</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let previousPrices = {};
        let currentPage = 'dashboard';
        
        // Token auth logic
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token') || '';
        if (!token) {
            document.getElementById('token-warning').classList.remove('hidden');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('hidden');
        }

        function showPage(pageId) {
            // Update UI
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            
            // Update Nav
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.querySelectorAll('nav button').forEach(b => b.classList.add('text-slate-400'));
            const activeBtn = document.getElementById(`nav-${pageId}`);
            activeBtn.classList.add('active-nav');
            activeBtn.classList.remove('text-slate-400');

            // Update Header
            const titles = {
                dashboard: 'Trading Dashboard',
                users: 'User Management',
                alerts: 'Opportunity History',
                payments: 'Revenue & Payments',
                settings: 'System Configuration'
            };
            const subtitles = {
                dashboard: 'Real-time market insights and arbitrage management.',
                users: 'Manage user access, tiers, and subscription dates.',
                alerts: 'Historical logs of arbitrage signals sent.',
                payments: 'Track subscriptions and revenue history.',
                settings: 'Configure the parameters that drive the application.'
            };
            document.getElementById('page-title').innerText = titles[pageId];
            document.getElementById('page-subtitle').innerText = subtitles[pageId];
            
            currentPage = pageId;
            if (window.innerWidth < 1024) toggleSidebar();
            
            if (pageId === 'settings') {
                fetchSettings();
            } else if (pageId === 'payments') {
                fetchPayments();
            } else {
                fetchData();
            }
        }

        async function fetchData() {
            try {
                const headers = { 'Authorization': `Bearer ${token}` };

                const statsRes = await fetch('/api/stats', { headers });
                const stats = await statsRes.json();
                document.getElementById('stat-total-users').innerText = stats.totalUsers || 0;
                document.getElementById('stat-premium-users').innerText = stats.premiumUsers || 0;
                document.getElementById('stat-total-alerts').innerText = stats.totalAlerts || 0;
                document.getElementById('stat-total-revenue').innerText = `${(stats.totalRevenue || 0).toFixed(2)}`;

                const priceRes = await fetch('/api/prices', { headers });
                renderPrices(await priceRes.json());

                const alertRes = await fetch('/api/alerts', { headers });
                const alerts = await alertRes.json();
                if (Array.isArray(alerts)) {
                    renderAlerts(alerts, 'alert-table-body', 5);
                    renderAlerts(alerts, 'alert-full-table-body', 20);
                }

                const userRes = await fetch('/api/users', { headers });
                const users = await userRes.json();
                if (Array.isArray(users)) {
                    renderUsers(users);
                }
            } catch (err) {
                console.error('Failed to fetch data:', err);
            }
        }

        // --- Settings Management ---
        async function fetchSettings() {
            if (!token) return;
            try {
                const res = await fetch(`/admin/settings?token=${token}`);
                if (!res.ok) throw new Error('Failed to fetch settings');
                const settings = await res.json();
                document.getElementById('setting_PRO_PRICE_USD').value = settings.PRO_PRICE_USD || 3;
                document.getElementById('setting_PRO_PRICE_MWK').value = settings.PRO_PRICE_MWK || 5000;
                document.getElementById('setting_VIP_PRICE_USD').value = settings.VIP_PRICE_USD || 7;
                document.getElementById('setting_VIP_PRICE_MWK').value = settings.VIP_PRICE_MWK || 12000;
            } catch (err) {
                console.error(err);
            }
        }

        async function saveSettings() {
            if (!token) return alert('No admin token provided');
            const data = {
                PRO_PRICE_USD: document.getElementById('setting_PRO_PRICE_USD').value,
                PRO_PRICE_MWK: document.getElementById('setting_PRO_PRICE_MWK').value,
                VIP_PRICE_USD: document.getElementById('setting_VIP_PRICE_USD').value,
                VIP_PRICE_MWK: document.getElementById('setting_VIP_PRICE_MWK').value
            };
            try {
                const res = await fetch(`/admin/settings?token=${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    alert('Settings automatically saved and applied.');
                } else {
                    alert('Failed to save settings');
                }
            } catch (err) {
                console.error(err);
            }
        }

        // --- Payment Tracking ---
        async function fetchPayments() {
            if (!token) return;
            try {
                const res = await fetch(`/admin/payments?token=${token}`);
                if (!res.ok) throw new Error('Failed to fetch payments');
                const payments = await res.json();
                const tbody = document.getElementById('payment-table-body');
                tbody.innerHTML = '';
                payments.forEach(p => {
                    const row = document.createElement('tr');
                    const badgeColor = p.status === 'confirmed' ? 'bg-green-500/20 text-green-500' : 'bg-red-500/20 text-red-500';
                    row.innerHTML = `
                        <td class="px-6 py-4 text-sm">${new Date(p.created_at).toLocaleString()}</td>
                        <td class="px-6 py-4 font-bold text-sm">@${p.username || p.user_id}</td>
                        <td class="px-6 py-4 text-xs font-mono text-slate-400">${p.tx_ref}</td>
                        <td class="px-6 py-4 font-medium text-sm">${p.amount} ${p.currency}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase ${badgeColor}">${p.status}</span>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error(err);
            }
        }

        // --- Renders for common elements ---
        function renderPrices(data) {
            const priceList = document.getElementById('price-list');
            priceList.innerHTML = '';
            for (const pair in data) {
                const exchangePrices = data[pair];
                const avgPrice = exchangePrices.reduce((acc, curr) => acc + curr.price, 0) / exchangePrices.length;
                let trendColor = 'text-amber-500';
                let trendIcon = 'minus';
                if (previousPrices[pair]) {
                    if (avgPrice > previousPrices[pair]) { trendColor = 'text-green-500'; trendIcon = 'trending-up'; }
                    else if (avgPrice < previousPrices[pair]) { trendColor = 'text-red-500'; trendIcon = 'trending-down'; }
                }
                previousPrices[pair] = avgPrice;
                const card = document.createElement('div');
                card.className = 'card p-4 rounded-2xl flex flex-col gap-2 transition-all hover:scale-[1.02] cursor-pointer';
                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-slate-700 rounded-full flex items-center justify-center font-bold text-xs">${pair.substring(0, 1)}</div>
                            <span class="font-bold text-sm md:text-base">${pair}</span>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="text-sm md:text-lg font-bold ${trendColor}">$${avgPrice.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                        </div>
                    </div>
                `;
                priceList.appendChild(card);
            }
        }

        function renderAlerts(alerts, targetId, limit) {
            const tbody = document.getElementById(targetId);
            if (!tbody) return;
            tbody.innerHTML = '';
            alerts.slice(0, limit).forEach(alert => {
                const row = document.createElement('tr');
                row.className = 'table-row transition-colors';
                row.innerHTML = targetId === 'alert-table-body' ? `
                    <td class="px-6 py-4 font-semibold text-sm">${alert.pair}</td>
                    <td class="px-6 py-4 text-xs text-slate-400">${alert.buy_exchange} → ${alert.sell_exchange}</td>
                    <td class="px-6 py-4 text-right accent-green font-bold text-sm">+${alert.spread}%</td>
                ` : `
                    <td class="px-6 py-4 text-xs text-slate-500">${new Date(alert.created_at).toLocaleString()}</td>
                    <td class="px-6 py-4 font-semibold text-sm">${alert.pair}</td>
                    <td class="px-6 py-4 text-xs text-slate-400">${alert.buy_exchange} @ $${alert.buy_price.toLocaleString()}</td>
                    <td class="px-6 py-4 text-xs text-slate-400">${alert.sell_exchange} @ $${alert.sell_price.toLocaleString()}</td>
                    <td class="px-6 py-4 text-right accent-green font-bold text-sm">+${alert.spread}%</td>
                `;
                tbody.appendChild(row);
            });
        }

        function renderUsers(users) {
            const tbody = document.getElementById('user-full-table-body');
            tbody.innerHTML = '';
            users.forEach(user => {
                const row = document.createElement('tr');
                row.className = 'table-row transition-colors';
                
                const tierBadges = {
                    free: 'bg-slate-700 text-slate-300',
                    pro: 'bg-blue-500/20 text-blue-400 border border-blue-500/30',
                    vip: 'bg-purple-500/20 text-purple-400 border border-purple-500/30',
                    banned: 'bg-red-500/20 text-red-400 border border-red-500/30',
                };
                const tierBadge = tierBadges[user.tier] || tierBadges['free'];
                const expiryDate = user.subscribed_until ? new Date(user.subscribed_until).toLocaleDateString() : 'N/A';
                const joinedDate = user.created_at ? new Date(user.created_at).toLocaleDateString() : 'N/A';

                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center gap-3">
                            <div class="font-medium">${user.username || 'N/A'}</div>
                            <div class="text-sm text-slate-400 font-mono">${user.telegram_id}</div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 py-1 font-semibold text-xs rounded-full ${tierBadge}">
                            ${user.tier.toUpperCase()}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-400">${joinedDate}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-400">${expiryDate}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="openUserModal(${user.id})" class="text-blue-500 hover:text-blue-400">Edit</button>
                        <button onclick="deleteUser(${user.id})" class="text-red-500 hover:text-red-400 ml-4">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // --- User Edits ---
        async function openUserModal(userId) {
            if (!token) return alert('No admin token provided');
            try {
                const headers = { 'Authorization': `Bearer ${token}` };
                const res = await fetch(`/admin/users/${userId}?token=${token}`, { headers });
                if (!res.ok) throw new Error('Failed to fetch user data');
                const user = await res.json();

                document.getElementById('edit-user-id').value = user.id;
                document.getElementById('edit-user-tier').value = user.tier;
                const expiry = user.subscribed_until ? user.subscribed_until.split('T')[0] : '';
                document.getElementById('edit-user-expiry').value = expiry;
                
                document.getElementById('user-modal').classList.add('active');
                setTimeout(() => {
                    document.getElementById('user-modal-content').classList.remove('scale-95');
                    document.getElementById('user-modal-content').classList.add('scale-100');
                }, 10);

            } catch (error) {
                console.error('Error opening user modal:', error);
                alert('Could not load user data. Please try again.');
            }
        }

        function closeUserModal() {
            document.getElementById('user-modal-content').classList.remove('scale-100');
            document.getElementById('user-modal-content').classList.add('scale-95');
            setTimeout(() => {
                document.getElementById('user-modal').classList.remove('active');
            }, 200);
        }

        async function saveUserEdit() {
            if (!token) return alert('No admin token provided');
            const id = document.getElementById('edit-user-id').value;
            const tier = document.getElementById('edit-user-tier').value;
            const expiry = document.getElementById('edit-user-expiry').value || null;
            
            try {
                const res = await fetch(`/admin/users/${id}?token=${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tier, subscribed_until: expiry })
                });
                if (res.ok) {
                    closeUserModal();
                    fetchData();
                } else {
                    alert('Failed to update user');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteUser(id) {
            if (!token) return alert('No admin token provided');
            if (!confirm('Are you absolutely sure you want to permanently delete this user?')) return;
            try {
                const res = await fetch(`/admin/users/${id}?token=${token}`, { method: 'DELETE' });
                if (res.ok) {
                    fetchData();
                } else {
                    alert('Failed to delete user');
                }
            } catch (err) {
                console.error(err);
            }
        }

        setInterval(() => {
            if (currentPage === 'dashboard') fetchData();
            if (currentPage === 'payments') fetchPayments();
        }, 10000); // 10s auto-refresh

        fetchData();
    </script>
</body>
</html>
